name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile --output-filename=treasure-hunter.exe --assume-yes-for-downloads treasure_hunter/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: treasure-hunter-windows
          path: treasure-hunter.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: treasure-hunter.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile --output-filename=treasure-hunter-linux --assume-yes-for-downloads treasure_hunter/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: treasure-hunter-linux
          path: treasure-hunter-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: treasure-hunter-linux
          generate_release_notes: true
